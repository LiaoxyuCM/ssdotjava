on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v7.0.0

    - name: Set up JDK
      uses: actions/setup-java@v5.3.0
      with:
        java-version: '21'

    - name: Set up Node
      uses: actions/setup-node@v6.4.0

    - name: Build project
      run: npm run build
    
    - name: Upload artifact
      uses: actions/upload-artifact@v7.0.1
      with:
        name: ssdot-java
        path: dist/ssdot-java.jar
